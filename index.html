<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Viajes — Planificador de Itinerarios</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Pantalla de login -->
  <div id="login-screen" style="display:none">
    <div class="login-card">
      <div class="login-logo">🗺</div>
      <h2>Mis Viajes</h2>
      <p class="login-subtitle">Tu planificador de itinerarios</p>
      <label for="login-user">Usuario</label>
      <input id="login-user" type="text" placeholder="Tu nombre de usuario"
             autocomplete="username" autocapitalize="none" spellcheck="false">
      <label for="login-pass">Contraseña</label>
      <div class="pass-wrap">
        <input id="login-pass" type="password" placeholder="••••••••"
               autocomplete="current-password">
        <button class="pass-toggle" type="button" onclick="togglePass()" title="Mostrar/ocultar">👁</button>
      </div>
      <div id="login-error" class="login-error"></div>
      <div class="login-btns">
        <button id="btn-login" class="btn-block primary" onclick="doLogin()">Iniciar sesión</button>
        <button id="btn-register" class="btn-block secondary" onclick="doRegister()">Crear cuenta nueva</button>
      </div>
    </div>
  </div>

  <div id="app" style="display:none">
    <div class="top-bar">
      <span class="title">🗺 Mis Viajes</span>
      <div class="panorama-tabs" id="tabs"></div>
      <div class="user-info">
        <span class="user-name" id="user-display"></span>
        <button class="logout-btn" onclick="doLogout()">Cerrar sesión</button>
      </div>
    </div>
    <div id="content"></div>
  </div>

  <div id="modal-bg" class="modal-bg" style="display:none">
    <div class="modal" id="modal"></div>
  </div>

  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>

  <!-- Configuración Firebase -->
  <script src="js/firebase-config.js"></script>

  <!-- Model → View → Controller → Auth -->
  <script src="js/model.js"></script>
  <script src="js/view.js"></script>
  <script src="js/controller.js"></script>
  <script src="js/auth.js"></script>

</body>
</html>
